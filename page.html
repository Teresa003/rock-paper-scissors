<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="rps.css">
	<link href="https://fonts.googleapis.com/css2?family=Asap:wght@500&display=swap" rel="stylesheet">
</head>
<body>
		<div id="score-board">
		<div id="user-badge">User</div>
		<div id="computer-badge">Computer</div>
		<span id="player-score">0</span>:<span id="computer-score">0</span>
		</div>
		<div id="info">
		<p>Play for fun!!</p>
		<p id="win" class="info">You win!</p>
		<p id="lose" class="info">You lose!</p>
		<p id="draw" class="info">Draw!</p>
		</div>
		<div id="game-board">
			<img src="https://www.campcanary.co.uk/uploads/rock-icon-grey.png" id="rock">
			<img src="https://www.campcanary.co.uk/uploads/paper-icon-grey.png" id="paper">
			<img src="https://i.ya-webdesign.com/images/rock-paper-scissors-png-11.png" id="scissors">
		</div>
<script src="rps.js"></script>
</body>
</html>
